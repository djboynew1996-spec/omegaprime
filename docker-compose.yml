version: '3.8'

services:
  # Main Application
  omega-prime:
    build: .
    container_name: omega-prime
    environment:
      - OMEGA_SECRET_KEY=${OMEGA_SECRET_KEY:-GenerateStrongSecretKey123!}
      - OMEGA_DB_PATH=/app/data/omega_data.json
      - OMEGA_MAX_CONCURRENT=50
      - OMEGA_RATE_LIMIT=60
    volumes:
      - omega-data:/app/data
      - omega-logs:/app
    restart: unless-stopped
    networks:
      - omega-network
    stdin_open: true
    tty: true

  # Redis Cache (for future scaling)
  redis:
    image: redis:7-alpine
    container_name: omega-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-OmegaRedis123!}
    volumes:
      - redis-data:/data
    networks:
      - omega-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # PostgreSQL Database (for future SQL needs)
  postgres:
    image: postgres:15-alpine
    container_name: omega-postgres
    environment:
      - POSTGRES_DB=omega_db
      - POSTGRES_USER=omega_user
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-OmegaPostgres123!}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - omega-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omega_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # License Store Web App
  omega-license-store:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: omega-license-store
    environment:
      - OMEGA_SECRET_KEY=${OMEGA_SECRET_KEY:-GenerateStrongSecretKey123!}
      - STRIPE_API_KEY=${STRIPE_API_KEY:-}
      - STRIPE_PUBLIC_KEY=${STRIPE_PUBLIC_KEY:-pk_test_xxxxxxxx}
      - LICENSE_API_KEY=${LICENSE_API_KEY:-admin123}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      - FLASK_SECRET_KEY=${FLASK_SECRET_KEY:-change-me-in-production}
    ports:
      - "5000:5000"
    networks:
      - omega-network
    restart: unless-stopped
    depends_on:
      - redis

  # Monitoring: Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: omega-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    ports:
      - "9090:9090"
    networks:
      - omega-network
    restart: unless-stopped

  # Monitoring: Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: omega-grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_INSTALL_PLUGINS=redis-datasource
    volumes:
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    networks:
      - omega-network
    restart: unless-stopped
    depends_on:
      - prometheus

volumes:
  omega-data:
  omega-logs:
  redis-data:
  postgres-data:
  prometheus-data:
  grafana-data:

networks:
  omega-network:
    driver: bridge
